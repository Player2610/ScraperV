name: Deploy API

on:
  push:
    branches: [main]

# Cancela deploys en curso si llega uno nuevo
concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, migrate & deploy API
    runs-on: ubuntu-latest
    needs: [] # El CI corre en paralelo; el merge a main ya implica que pasó

    permissions:
      contents: read
      id-token: write # Requerido para Workload Identity Federation

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      IMAGE: us-${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/protou/api

    steps:
      - uses: actions/checkout@v4

      # Autenticación sin service account keys — WIF
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build + push con tag SHA y latest
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build + push del migrate para correr migraciones
      - name: Build and push migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrate
          push: true
          tags: |
            us-${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/protou/migrate:${{ github.sha }}
            us-${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/protou/migrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Actualizar el Cloud Run Job de migraciones con la nueva imagen
      - name: Update migrate job image
        run: |
          gcloud run jobs update protou-migrate \
            --image us-${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/protou/migrate:${{ github.sha }} \
            --region ${{ env.REGION }}

      # Correr migraciones ANTES de desplegar el nuevo API
      - name: Run database migrations
        run: |
          gcloud run jobs execute protou-migrate \
            --region ${{ env.REGION }} \
            --wait
        timeout-minutes: 5

      # Deploy del Cloud Run Service con la nueva imagen
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy protou-api \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --service-account ${{ secrets.API_SERVICE_ACCOUNT }} \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --quiet

      # Verificar que el deploy está healthy
      - name: Smoke test
        run: |
          URL=$(gcloud run services describe protou-api \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          curl --fail --silent "$URL/health" | grep -q '"status":"ok"'
          echo "✅ API healthy at $URL"

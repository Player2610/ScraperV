run:
  timeout: 5m
  go: "1.23"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gofmt
    - goimports
    - unconvert
    - noctx
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - copyloopvar
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  errcheck:
    check-type-assertions: true
    # El código usa `_ =` deliberadamente para ignorar errores fire-and-forget
    # (notificaciones best-effort, UpdateJob). check-blank:true contradice ese idioma.
    check-blank: false
  govet:
    # Analizadores por defecto (sin enable-all: fieldalignment es pedante y opt-in).
    disable:
      - fieldalignment
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/protou/protou

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
